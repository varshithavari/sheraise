<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Idea Chat</title>
<style>
  body { font-family: Arial, sans-serif; background: #fdf6f0; padding: 20px; }
  #chatBox { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; margin-bottom: 10px; background: #fff;}
  #userMessage { width: 80%; padding: 5px; }
  #sendBtn { padding: 5px 10px; }
</style>
</head>
<body>

<h2>Ask about this Business Idea</h2>
<div id="chatBox"></div>
<input type="text" id="userMessage" placeholder="Type your question here">
<button id="sendBtn">Send</button>

<script>
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('userMessage');
const sendBtn = document.getElementById('sendBtn');

// For testing only, replace with your OpenAI key
const API_KEY = "YOUR_API_KEY";

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  chatBox.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
  input.value = '';

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-3.5-turbo",
        messages: [{ role: "user", content: message }]
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;
    chatBox.innerHTML += `<p><strong>AI:</strong> ${reply}</p>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  } catch (err) {
    chatBox.innerHTML += `<p style="color:red;"><strong>Error:</strong> ${err}</p>`;
  }
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
