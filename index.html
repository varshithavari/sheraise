<!DOCTYPE html>
<html>
<head>
<title>SheRise AI</title>
<link rel="stylesheet" href="style.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("City lights at night.jpg");
  background-size:cover;
  background-position:center;
  color:white;
}

.main{
  width:90%;
  max-width:1200px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* Left Image */
.left img{
  width:600px;
  max-width:100%;
}

/* Right Side */
.right{
  text-align:center;
}

.header{
  font-size:40px;
  margin-bottom:15px;
  color:#ff4fa3;
}

.subtitle{
  margin-bottom:30px;
  font-size:18px;
}

/* Glass Form */
.container{
  width:380px;
  padding:40px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

.container h2{
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1);
  color:white;
}

input::placeholder{
  color:rgba(255,255,255,0.7);
}

option{
  color:black;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  background: linear-gradient(90deg,#ff7b54,#6a5af9);
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

@media(max-width:900px){
  .main{
    flex-direction:column;
  }
  .left{
    margin-bottom:30px;
  }
}
</style>
</head>

<body>

<div class="main">

  <!-- LEFT SIDE IMAGE -->
  <div class="left">
    <img src="ChatGPT Image Mar 4, 2026, 02_44_31 PM.png" alt="Woman Entrepreneur">
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <div class="header" >SheRise AI</div>
    <div class="subtitle">Empowering Women Entrepreneurs with Smart AI Solutions</div>

    <div class="container">
      <h2>Enter Your Details</h2>

      <input type="text" id="username" placeholder="Username" required>
      <input type="number" id="age" placeholder="Age" required>

      <select id="place">
        <option value="Urban">Urban</option>
        <option value="Rural">Rural</option>
      </select>

      <button onclick="saveUser()">Get Started</button>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
